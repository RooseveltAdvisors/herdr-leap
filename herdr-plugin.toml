id = "RooseveltAdvisors.herdr-leap"
name = "herdr-leap"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "EasyMotion/leap-style character jump and select-to-copy, plus visible-buffer token extract for Herdr"
platforms = ["linux", "macos"]

[[build]]
command = ["cargo", "build", "--release", "--locked"]

[[actions]]
id = "open"
title = "Leap (jump)"
description = "tmux-jump style: hint a word-start character and place the copy-mode cursor"
command = ["sh", "-c", "exec \"${HERDR_BIN_PATH:-herdr}\" plugin pane open --plugin RooseveltAdvisors.herdr-leap --entrypoint leap --placement popup --width 100% --height 100%"]

[[actions]]
id = "extract"
title = "Extract (copy visible tokens)"
description = "List copy-eligible text from the visible pane and copy a selection"
command = ["sh", "-c", "exec \"${HERDR_BIN_PATH:-herdr}\" plugin pane open --plugin RooseveltAdvisors.herdr-leap --entrypoint extract"]

[[panes]]
id = "leap"
title = "herdr-leap"
placement = "popup"
command = ["./target/release/herdr-leap"]

[[panes]]
id = "extract"
title = "herdr-leap-extract"
placement = "overlay"
command = ["./target/release/herdr-leap", "--mode", "extract"]
